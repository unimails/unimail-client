name: winget-update-request

on:
  workflow_run:
    workflows:
      - build
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to submit, for example v0.0.2"
        required: true

permissions:
  contents: read

jobs:
  pull-request:
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: ACCloud.UnimailClient
          release-tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.event.workflow_run.head_branch }}
          installers-regex: '^unimail-client_windows_(386|amd64|arm64)\.zip$'
          token: ${{ secrets.WINGET_TOKEN }}
