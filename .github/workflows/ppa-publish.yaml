name: publish-ppa

on:
  workflow_run:
    workflows:
      - build
    types:
      - completed
  workflow_dispatch:
    inputs:
      ubuntu_series:
        description: "Ubuntu series list: all, or comma/space separated values (e.g. noble,resolute)"
        required: false
        default: "all"
      upstream_version:
        description: "Upstream version to publish manually (e.g. 0.0.2). Tags use the tag name automatically."
        required: false
        default: ""
      ppa_revision:
        description: "Optional PPA retry revision (e.g. 1 builds 0.0.2ppa1~noble). Leave empty for normal releases."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  publish:
    name: Build and Upload PPA Source Package
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      DEFAULT_UBUNTU_SERIES: "noble resolute"
      LAUNCHPAD_USER: ${{ secrets.LAUNCHPAD_USER }}
      PPA_NAME: ${{ secrets.PPA_NAME }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.upstream_version || github.event.workflow_run.head_branch }}
      REQUESTED_UBUNTU_SERIES: ${{ github.event_name == 'workflow_dispatch' && inputs.ubuntu_series || 'all' }}
      PPA_REVISION_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.ppa_revision || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref }}

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ secrets.PPA_GPG_PRIVATE_KEY }}" ] || { echo "Missing secret: PPA_GPG_PRIVATE_KEY"; exit 1; }
          [ -n "${{ secrets.PPA_GPG_FINGERPRINT }}" ] || { echo "Missing secret: PPA_GPG_FINGERPRINT"; exit 1; }
          [ -n "${{ secrets.PPA_GPG_PASSPHRASE }}" ] || { echo "Missing secret: PPA_GPG_PASSPHRASE"; exit 1; }
          [ -n "${LAUNCHPAD_USER}" ] || { echo "Missing secret: LAUNCHPAD_USER"; exit 1; }
          [ -n "${PPA_NAME}" ] || { echo "Missing secret: PPA_NAME"; exit 1; }
          [ -n "${RELEASE_TAG}" ] || { echo "Failed to resolve release tag from build workflow run"; exit 1; }

      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dh-make dput-ng gnupg

      - name: Import signing key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
          GPG_FINGERPRINT: ${{ secrets.PPA_GPG_FINGERPRINT }}
        run: |
          set -euo pipefail
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "${GNUPGHOME}"
          printf '%s' "${GPG_PRIVATE_KEY}" | base64 --decode | gpg --batch --import
          KEYGRIP="$(gpg --with-keygrip --list-secret-keys "${GPG_FINGERPRINT}" | awk '/Keygrip/ {print $3; exit}')"
          if [ -z "${KEYGRIP}" ]; then
            echo "Failed to detect GPG keygrip"
            exit 1
          fi
          cat > "${GNUPGHOME}/gpg.conf" <<'EOF'
          pinentry-mode loopback
          batch
          no-tty
          EOF
          cat > "${GNUPGHOME}/gpg-agent.conf" <<'EOF'
          allow-loopback-pinentry
          EOF
          echo "default-key ${GPG_FINGERPRINT}" >> "${GNUPGHOME}/gpg.conf"
          gpgconf --kill gpg-agent
          # Prime passphrase cache for later signing steps in non-interactive CI.
          printf "copilot-ppa-signing" | gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" --local-user "${GPG_FINGERPRINT}" --clearsign >/dev/null
          {
            echo "GPG_TTY=$(tty || true)"
            echo "GNUPGHOME=${GNUPGHOME}"
            echo "DEB_SIGN_KEYID=${GPG_FINGERPRINT}"
            echo "PPA_GPG_PASSPHRASE=${GPG_PASSPHRASE}" # 修复隐患 3：将密码抛给环境变量，以便打包工具在沙箱中读取
          } >> "${GITHUB_ENV}"

      # 解决问题 1：在打包前切为 native 格式，并由 CI 自动生成完备的离线依赖目录
      - name: Prepare Go Vendor Offline Cache
        shell: bash
        run: |
          set -euo pipefail
          go mod tidy
          go mod vendor

      - name: Build source package
        shell: bash
        env:
          DEBFULLNAME: allcloud.top
          DEBEMAIL: admin@allcloud.top
        run: |
          set -euo pipefail
          chmod +x scripts/build-ppa-source.sh scripts/upload-ppa.sh debian/rules

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            version_tag="${RELEASE_TAG#v}"
            ppa_revision=""
          else
            version_tag="${RELEASE_TAG#v}"
            ppa_revision="${PPA_REVISION_INPUT}"
            if [[ -z "${version_tag}" ]]; then
              echo "Manual PPA publish requires workflow_dispatch input: upstream_version" >&2
              exit 1
            fi
          fi

          requested_series="${REQUESTED_UBUNTU_SERIES}"
          if [[ -z "${requested_series}" || "${requested_series}" == "all" ]]; then
            series_list="${DEFAULT_UBUNTU_SERIES}"
          else
            series_list="$(printf '%s' "${requested_series}" | tr ',' ' ')"
          fi

          # 针对本地脚本调用 dpkg-buildpackage 时，强行注入环境变量密码
          export DEB_SIGN_KEYID="${{ secrets.PPA_GPG_FINGERPRINT }}"

          for ubuntu_series in ${series_list}; do
            ./scripts/build-ppa-source.sh "${ubuntu_series}" "${version_tag}" "${ppa_revision}"
          done

      - name: Upload to Launchpad PPA
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          changes_files=(../*_source.changes)
          if (( ${#changes_files[@]} == 0 )); then
            echo "No .changes file found. Build source package first." >&2
            exit 1
          fi

          for changes_file in "${changes_files[@]}"; do
            ./scripts/upload-ppa.sh "${LAUNCHPAD_USER}" "${PPA_NAME}" "${changes_file}"
          done
